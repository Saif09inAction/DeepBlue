################################################################################
# DeepBlue – Terraform Plan/Apply Workflow
# Validates and applies infrastructure changes via GitHub Actions
################################################################################

name: Terraform Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to apply (dev/staging/prod)'
        required: true
        type: choice
        options: [dev, staging, prod]
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options: [plan, apply, destroy]
        default: plan

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.8.3"
  AWS_REGION: "us-east-1"

jobs:
  terraform-validate:
    name: Validate Terraform Code
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/deepblue-terraform-role
        aws-region: ${{ env.AWS_REGION }}

    - name: Terraform Format Check
      run: |
        terraform fmt -check -recursive terraform/
        echo "✅ Terraform formatting is valid."

    - name: Terraform Validate (dev)
      run: |
        cd terraform/environments/dev
        terraform init -backend=false
        terraform validate
        echo "✅ Dev Terraform configuration is valid."

    - name: Terraform Validate (prod)
      run: |
        cd terraform/environments/prod
        terraform init -backend=false
        terraform validate
        echo "✅ Prod Terraform configuration is valid."

    - name: Run tflint
      uses: terraform-linters/setup-tflint@v4
      with:
        tflint_version: latest

    - name: Run TFLint
      run: |
        cd terraform/
        tflint --recursive --config=.tflint.hcl

    - name: Run Checkov security scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: terraform/
        framework: terraform
        soft_fail: false
        output_format: github_failed_only

  terraform-plan:
    name: Terraform Plan – ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: terraform-validate
    strategy:
      matrix:
        environment: [dev, staging, prod]
      fail-fast: false
    environment: ${{ matrix.environment }}
    concurrency:
      group: terraform-${{ matrix.environment }}
      cancel-in-progress: false
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/deepblue-terraform-role
        role-session-name: TerraformPlan-${{ matrix.environment }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Terraform Init
      working-directory: terraform/environments/${{ matrix.environment }}
      run: |
        terraform init \
          -backend-config="bucket=deepblue-terraform-state-${{ matrix.environment }}" \
          -backend-config="key=${{ matrix.environment }}/terraform.tfstate" \
          -backend-config="region=${{ env.AWS_REGION }}" \
          -backend-config="dynamodb_table=deepblue-terraform-lock-${{ matrix.environment }}"

    - name: Terraform Plan
      id: plan
      working-directory: terraform/environments/${{ matrix.environment }}
      run: |
        terraform plan \
          -var-file="terraform.tfvars" \
          -out=tfplan \
          -detailed-exitcode \
          -input=false 2>&1 | tee plan_output.txt
        echo "exit_code=$?" >> $GITHUB_OUTPUT
      continue-on-error: true

    - name: Post plan to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const planOutput = fs.readFileSync('terraform/environments/${{ matrix.environment }}/plan_output.txt', 'utf8');
          const truncated = planOutput.length > 60000 
            ? planOutput.substring(0, 60000) + '\n\n... [truncated]' 
            : planOutput;
          
          const body = `## Terraform Plan – \`${{ matrix.environment }}\`
          
          <details>
          <summary>Show Plan Output</summary>
          
          \`\`\`hcl
          ${truncated}
          \`\`\`
          
          </details>
          
          **Exit Code:** ${{ steps.plan.outputs.exit_code }}
          - 0: No changes
          - 1: Error
          - 2: Changes present`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });

    - name: Fail if plan errored
      if: steps.plan.outputs.exit_code == '1'
      run: exit 1

  terraform-apply-dev:
    name: Terraform Apply – dev
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    concurrency:
      group: terraform-apply-dev
      cancel-in-progress: false
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/deepblue-terraform-role
        role-session-name: TerraformApply-dev
        aws-region: ${{ env.AWS_REGION }}

    - name: Terraform Init
      working-directory: terraform/environments/dev
      run: terraform init -backend-config="key=dev/terraform.tfstate"

    - name: Terraform Apply
      working-directory: terraform/environments/dev
      run: |
        terraform apply \
          -var-file="terraform.tfvars" \
          -auto-approve \
          -input=false

  terraform-apply-prod:
    name: Terraform Apply – prod
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event.inputs.action == 'apply' && github.event.inputs.environment == 'prod'
    environment: production
    concurrency:
      group: terraform-apply-prod
      cancel-in-progress: false
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/deepblue-terraform-role
        role-session-name: TerraformApply-prod
        aws-region: ${{ env.AWS_REGION }}

    - name: Terraform Init
      working-directory: terraform/environments/prod
      run: terraform init

    - name: Terraform Apply
      working-directory: terraform/environments/prod
      run: |
        terraform apply \
          -var-file="terraform.tfvars" \
          -auto-approve \
          -input=false
