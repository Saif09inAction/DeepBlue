################################################################################
# DeepBlue – Local Development Environment
# Mirrors the production microservice topology for developer workflows
################################################################################

version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 30s

networks:
  deepblue-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:
  redis_data:
  opensearch_data:
  grafana_data:
  prometheus_data:
  vault_data:
  elasticsearch_data:
  logstash_data:
  kibana_data:

services:

  # ─────────────────────────────────────────
  # Infrastructure: PostgreSQL + TimescaleDB
  # ─────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: deepblue-postgres
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: deepblue
      POSTGRES_USER: deepblue_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev_pass_change_me}
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U deepblue_admin -d deepblue"]
    logging: *default-logging

  # ─────────────────────────────────────────
  # Messaging: Zookeeper + Kafka
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: deepblue-zookeeper
    restart: unless-stopped
    networks: [deepblue-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "nc", "-z", "localhost", "2181"]
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: deepblue-kafka
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
    logging: *default-logging

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: deepblue-kafka-ui
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: deepblue-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    logging: *default-logging

  # ─────────────────────────────────────────
  # Cache: Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: deepblue-redis
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    logging: *default-logging

  # ─────────────────────────────────────────
  # Search: OpenSearch
  # ─────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: deepblue-opensearch
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      plugins.security.disabled: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cat/health | grep -q green"]
    logging: *default-logging

  # ─────────────────────────────────────────
  # Secrets: HashiCorp Vault (Dev Mode)
  # ─────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: deepblue-vault
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: deepblue-dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    volumes:
      - vault_data:/vault/data
      - ./scripts/vault/init.sh:/vault/init.sh:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "vault status -address=http://localhost:8200"]
    logging: *default-logging

  # ─────────────────────────────────────────
  # Observability: Prometheus
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: deepblue-prometheus
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "9091:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.enable-admin-api
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules/:/etc/prometheus/rules/:ro
      - prometheus_data:/prometheus
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
    logging: *default-logging

  # ─────────────────────────────────────────
  # Observability: Grafana
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: deepblue-grafana
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-deepblue_grafana_dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources/:/etc/grafana/provisioning/datasources/:ro
      - ./monitoring/grafana/provisioning/dashboards/:/etc/grafana/provisioning/dashboards/:ro
      - ./monitoring/grafana/dashboards/:/etc/grafana/dashboards/:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
    logging: *default-logging

  # ─────────────────────────────────────────
  # Logging: ELK Stack
  # ─────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: deepblue-elasticsearch
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.monitoring.templates.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=deepblue-logging
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
    logging: *default-logging

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: deepblue-logstash
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "5044:5044"
      - "9600:9600"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - ./elk/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./elk/logstash/pipeline/deepblue.conf:/usr/share/logstash/pipeline/deepblue.conf:ro
      - logstash_data:/usr/share/logstash/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -s http://localhost:9600/_node/stats | grep -q uptime"]
    logging: *default-logging

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: deepblue-kibana
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=deepblue-kibana
      - SERVER_PUBLICBASEURL=http://localhost:5601
      - XPACK_SECURITY_ENABLED=false
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=deepblue-kibana-32-char-dev-key!!
    volumes:
      - kibana_data:/usr/share/kibana/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"overall\"'"]
    logging: *default-logging

  # ─────────────────────────────────────────
  # Application: Ingestion Service
  # ─────────────────────────────────────────
  ingestion-service:
    build:
      context: ./services/ingestion-service
      dockerfile: ../../Dockerfiles/ingestion-service.Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
        VCS_REF: ${GIT_SHA:-unknown}
        VERSION: ${VERSION:-dev}
    image: deepblue/ingestion-service:dev
    container_name: deepblue-ingestion
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "8081:8080"
      - "9081:9090"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_RAW: raw-sensor-data
      KAFKA_CONSUMER_GROUP: ingestion-consumer-group
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: deepblue
      DB_USER: deepblue_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD:-localdev_pass_change_me}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: deepblue-dev-root-token
      LOG_LEVEL: DEBUG
      ENVIRONMENT: development
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
    logging: *default-logging

  # ─────────────────────────────────────────
  # Application: API Service
  # ─────────────────────────────────────────
  api-service:
    build:
      context: ./services/api-service
      dockerfile: ../../Dockerfiles/api-service.Dockerfile
    image: deepblue/api-service:dev
    container_name: deepblue-api
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: deepblue
      DB_USER: deepblue_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD:-localdev_pass_change_me}
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_URL: http://opensearch:9200
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    logging: *default-logging
