################################################################################
# DeepBlue — Docker Compose
#
# QUICK START (recommended for demo/presentation):
#   docker compose --profile demo up -d
#   Open: http://localhost:5173  (dashboard)
#         http://localhost:8000/docs  (API)
#         http://localhost:3000  (Grafana)
#         http://localhost:9090  (Prometheus)
#
# FULL STACK (all infrastructure — needs 8 GB RAM):
#   docker compose --profile full up -d
#   Adds: Kafka, Redis, Elasticsearch, Logstash, Kibana, Vault
#
# STOP:
#   docker compose --profile demo down
#   docker compose --profile full down -v   # also removes volumes
################################################################################

version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &hc
  interval: 20s
  timeout: 10s
  retries: 5
  start_period: 30s

networks:
  deepblue-net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  elasticsearch_data:
  kibana_data:
  vault_data:

services:

  # ══════════════════════════════════════════════════════════
  # PROFILE: demo  — App + Monitoring only (fast startup)
  # ══════════════════════════════════════════════════════════

  # ── FastAPI Demo Backend ─────────────────────────────────
  demo-api:
    build:
      context: ./demo
      dockerfile: Dockerfile
    image: deepblue/demo-api:latest
    container_name: deepblue-api
    profiles: [demo, full]
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "8000:8000"
    healthcheck:
      <<: *hc
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    logging: *default-logging

  # ── React Frontend (Nginx) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: deepblue/frontend:latest
    container_name: deepblue-frontend
    profiles: [demo, full]
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "8080:80"
    depends_on:
      demo-api:
        condition: service_healthy
    environment:
      - NGINX_HOST=localhost
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
    logging: *default-logging

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: deepblue-prometheus
    profiles: [demo, full]
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules/:/etc/prometheus/rules/:ro
      - prometheus_data:/prometheus
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
    logging: *default-logging

  # ── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: deepblue-grafana
    profiles: [demo, full]
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: deepblue2026
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources/:/etc/grafana/provisioning/datasources/:ro
      - ./monitoring/grafana/provisioning/dashboards/:/etc/grafana/provisioning/dashboards/:ro
      - ./monitoring/grafana/dashboards/:/etc/grafana/dashboards/:ro
    healthcheck:
      <<: *hc
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
    logging: *default-logging

  # ══════════════════════════════════════════════════════════
  # PROFILE: full  — Complete infrastructure stack
  # ══════════════════════════════════════════════════════════

  # ── PostgreSQL / TimescaleDB ─────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: deepblue-postgres
    profiles: [full]
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: deepblue
      POSTGRES_USER: deepblue_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deepblue_local_dev}
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "pg_isready -U deepblue_admin -d deepblue"]
    logging: *default-logging

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: deepblue-redis
    profiles: [full]
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *hc
      test: ["CMD", "redis-cli", "ping"]
    logging: *default-logging

  # ── Zookeeper ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: deepblue-zookeeper
    profiles: [full]
    restart: unless-stopped
    networks: [deepblue-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      <<: *hc
      test: ["CMD", "nc", "-z", "localhost", "2181"]
    logging: *default-logging

  # ── Kafka ────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: deepblue-kafka
    profiles: [full]
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "9092:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      <<: *hc
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
    logging: *default-logging

  # ── Kafka UI ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: deepblue-kafka-ui
    profiles: [full]
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: deepblue-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    logging: *default-logging

  # ── Elasticsearch ────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: deepblue-elasticsearch
    profiles: [full]
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=deepblue-logging
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
    logging: *default-logging

  # ── Kibana ───────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: deepblue-kibana
    profiles: [full]
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=deepblue-kibana
      - XPACK_SECURITY_ENABLED=false
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=deepblue-kibana-enc-key-32chars!!
    volumes:
      - kibana_data:/usr/share/kibana/data
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q '\"overall\"'"]
    logging: *default-logging

  # ── Vault ────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.15
    container_name: deepblue-vault
    profiles: [full]
    restart: unless-stopped
    networks: [deepblue-net]
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: deepblue-dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: vault server -dev
    healthcheck:
      <<: *hc
      test: ["CMD", "vault", "status"]
    logging: *default-logging
