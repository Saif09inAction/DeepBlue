# ============================================================
# DeepBlue — Elasticsearch Configuration
# Role: Stores and indexes all platform logs and metrics
# ============================================================

cluster.name: deepblue-logging
node.name: ${HOSTNAME}

# ── Network ──────────────────────────────────────────────────
network.host: 0.0.0.0
http.port: 9200
transport.port: 9300

# ── Discovery ────────────────────────────────────────────────
discovery.seed_hosts:
  - elasticsearch-1:9300
  - elasticsearch-2:9300
  - elasticsearch-3:9300
cluster.initial_master_nodes:
  - elasticsearch-1
  - elasticsearch-2
  - elasticsearch-3

# ── Data Storage ─────────────────────────────────────────────
path.data: /usr/share/elasticsearch/data
path.logs: /usr/share/elasticsearch/logs

# ── Security ─────────────────────────────────────────────────
xpack.security.enabled: true
xpack.security.transport.ssl.enabled: true
xpack.security.transport.ssl.verification_mode: certificate
xpack.security.transport.ssl.keystore.path: /usr/share/elasticsearch/config/certs/elastic-certificates.p12
xpack.security.transport.ssl.truststore.path: /usr/share/elasticsearch/config/certs/elastic-certificates.p12
xpack.security.http.ssl.enabled: true
xpack.security.http.ssl.keystore.path: /usr/share/elasticsearch/config/certs/http.p12

# ── Monitoring ───────────────────────────────────────────────
xpack.monitoring.enabled: true
xpack.monitoring.collection.enabled: true

# ── Index Lifecycle Management ───────────────────────────────
xpack.ilm.enabled: true

# ── Performance ──────────────────────────────────────────────
indices.memory.index_buffer_size: 20%
indices.queries.cache.size: 15%
thread_pool.write.queue_size: 1000

# ── Snapshot Repository ──────────────────────────────────────
# Configured to point to S3 for automated backups
# repositories.url.allowed_urls: ["s3://deepblue-logs-backup/*"]
