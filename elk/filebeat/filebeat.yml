# ============================================================
# DeepBlue — Filebeat Configuration
# Role: Ships logs from all Kubernetes pods to Logstash
# Deployed as a DaemonSet on every EKS node
# ============================================================

filebeat.autodiscover:
  providers:
    - type: kubernetes
      node: ${NODE_NAME}
      hints.enabled: true
      hints.default_config:
        type: container
        paths:
          - /var/log/containers/*${data.kubernetes.container.id}.log
      templates:
        # DeepBlue API service
        - condition:
            contains:
              kubernetes.labels.app: "api-service"
          config:
            - type: container
              paths:
                - /var/log/containers/*${data.kubernetes.container.id}.log
              json.keys_under_root: true
              json.overwrite_keys: true
              json.add_error_key: true
              fields:
                service: "api-service"
                environment: "production"
                platform: "deepblue"
              fields_under_root: true

        # DeepBlue Ingestion service
        - condition:
            contains:
              kubernetes.labels.app: "ingestion-service"
          config:
            - type: container
              paths:
                - /var/log/containers/*${data.kubernetes.container.id}.log
              json.keys_under_root: true
              json.overwrite_keys: true
              fields:
                service: "ingestion-service"
                environment: "production"
                platform: "deepblue"
              fields_under_root: true

        # Prometheus/Grafana monitoring namespace
        - condition:
            contains:
              kubernetes.namespace: "deepblue-monitoring"
          config:
            - type: container
              paths:
                - /var/log/containers/*${data.kubernetes.container.id}.log
              fields:
                service: "monitoring"
                environment: "production"
              fields_under_root: true

# ── Processors ───────────────────────────────────────────────
processors:
  - add_kubernetes_metadata:
      host: ${NODE_NAME}
      matchers:
        - logs_path:
            logs_path: "/var/log/containers/"
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - drop_fields:
      fields: ["agent.ephemeral_id", "ecs.version", "log.offset"]
      ignore_missing: true

# ── Output to Logstash ───────────────────────────────────────
output.logstash:
  hosts: ["logstash:5044"]
  ssl.enabled: true
  ssl.certificate_authorities: ["/etc/filebeat/certs/ca.crt"]
  ssl.certificate: "/etc/filebeat/certs/filebeat.crt"
  ssl.key: "/etc/filebeat/certs/filebeat.key"
  bulk_max_size: 2048
  worker: 2

# ── Internal Queue ───────────────────────────────────────────
queue.mem:
  events: 4096
  flush.min_events: 512
  flush.timeout: 5s

# ── Monitoring ───────────────────────────────────────────────
monitoring.enabled: true
monitoring.cluster_uuid: "${ES_CLUSTER_UUID}"

# ── Logging ──────────────────────────────────────────────────
logging.level: warning
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644
