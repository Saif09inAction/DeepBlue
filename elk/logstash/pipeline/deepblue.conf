# ============================================================
# DeepBlue — Logstash Pipeline Configuration
# Ingests logs from: Filebeat, Kafka, and direct HTTP
# ============================================================

# ── INPUT ────────────────────────────────────────────────────
input {
  # Filebeat input — receives logs from all K8s pods
  beats {
    port  => 5044
    ssl   => true
    ssl_certificate => "/usr/share/logstash/config/certs/logstash.crt"
    ssl_key         => "/usr/share/logstash/config/certs/logstash.key"
  }

  # Kafka input — application event logs
  kafka {
    id                  => "kafka-deepblue-logs"
    bootstrap_servers   => "kafka:9092"
    topics              => ["deepblue-api-logs", "deepblue-ingestion-logs", "deepblue-alerts"]
    group_id            => "logstash-consumers"
    codec               => json
    consumer_threads    => 4
    auto_offset_reset   => "earliest"
    security_protocol   => "SASL_SSL"
    sasl_mechanism      => "SCRAM-SHA-512"
    sasl_jaas_config    => "org.apache.kafka.common.security.scram.ScramLoginModule required username='${KAFKA_USER}' password='${KAFKA_PASSWORD}';"
    add_field => { "[@metadata][pipeline]" => "kafka" }
  }

  # HTTP input — webhook events from external sensors
  http {
    port  => 8080
    codec => json
    add_field => { "[@metadata][pipeline]" => "webhook" }
  }
}

# ── FILTER ───────────────────────────────────────────────────
filter {
  # Parse JSON logs
  if [message] =~ /^\{/ {
    json {
      source => "message"
      remove_field => ["message"]
    }
  }

  # Add timestamp if missing
  if ![timestamp] {
    mutate { add_field => { "timestamp" => "%{@timestamp}" } }
  }

  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ", "UNIX_MS"]
    target => "@timestamp"
  }

  # Enrich API service logs
  if [kubernetes][labels][app] == "api-service" {
    mutate {
      add_field => {
        "service_type" => "api"
        "platform"     => "deepblue"
      }
    }
    if [status_code] {
      if [status_code] >= 500 {
        mutate { add_field => { "log_level_group" => "error" } }
      } else if [status_code] >= 400 {
        mutate { add_field => { "log_level_group" => "warning" } }
      } else {
        mutate { add_field => { "log_level_group" => "info" } }
      }
    }
  }

  # Enrich ingestion service logs
  if [kubernetes][labels][app] == "ingestion-service" {
    mutate {
      add_field => {
        "service_type" => "ingestion"
        "platform"     => "deepblue"
      }
    }
    # Parse sensor event fields
    if [event_type] == "sensor_reading" {
      mutate {
        convert => {
          "sensor_value" => "float"
          "depth_m"      => "float"
        }
      }
    }
  }

  # GeoIP enrichment for sensor coordinates
  if [latitude] and [longitude] {
    mutate {
      add_field => {
        "[location][lat]" => "%{latitude}"
        "[location][lon]" => "%{longitude}"
      }
      convert => {
        "[location][lat]" => "float"
        "[location][lon]" => "float"
      }
    }
  }

  # Drop health check spam
  if [path] == "/health" or [path] == "/ready" {
    drop {}
  }

  # Remove sensitive fields
  mutate {
    remove_field => ["api_key", "password", "token", "secret", "authorization"]
  }
}

# ── OUTPUT ───────────────────────────────────────────────────
output {
  # Main Elasticsearch output
  elasticsearch {
    hosts    => ["https://elasticsearch:9200"]
    user     => "logstash_writer"
    password => "${LOGSTASH_WRITER_PASSWORD}"
    ssl      => true
    cacert   => "/usr/share/logstash/config/certs/ca.crt"

    # Dynamic index naming by service and date
    index => "deepblue-%{[service_type]:misc}-%{+YYYY.MM.dd}"

    # ILM policy
    ilm_enabled           => true
    ilm_rollover_alias    => "deepblue-logs"
    ilm_pattern           => "{now/d}-000001"
    ilm_policy            => "deepblue-30day-retention"

    # Template
    template_name    => "deepblue-logs"
    template_overwrite => true
  }

  # Dead letter queue output for failed events
  if "_jsonparsefailure" in [tags] or "_dateparsefailure" in [tags] {
    elasticsearch {
      hosts    => ["https://elasticsearch:9200"]
      user     => "logstash_writer"
      password => "${LOGSTASH_WRITER_PASSWORD}"
      ssl      => true
      cacert   => "/usr/share/logstash/config/certs/ca.crt"
      index    => "deepblue-parse-errors-%{+YYYY.MM.dd}"
    }
  }
}
