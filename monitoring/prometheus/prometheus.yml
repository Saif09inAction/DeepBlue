################################################################################
# DeepBlue – Prometheus Configuration
# Scrape configuration for all platform components
################################################################################

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: deepblue-prod-eks
    region: us-east-1
    environment: production

# Load alert rules
rule_files:
  - /etc/prometheus/rules/*.yml

# Alertmanager (optional — comment out if not running)
alerting:
  alertmanagers:
  - static_configs:
    - targets: []
    timeout: 10s

scrape_configs:

  # ── DeepBlue Demo API (Docker Compose) ────────────────────────────────────
  - job_name: deepblue-demo-api
    static_configs:
      - targets: ['demo-api:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # ── Prometheus itself ─────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ── Kubernetes API Server ──────────────────────────────────────────────────
  - job_name: kubernetes-apiservers
    kubernetes_sd_configs:
    - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      insecure_skip_verify: false
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
    - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
      action: keep
      regex: default;kubernetes;https

  # ── Kubernetes Nodes ───────────────────────────────────────────────────────
  - job_name: kubernetes-nodes
    kubernetes_sd_configs:
    - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
    - action: labelmap
      regex: __meta_kubernetes_node_label_(.+)
    - target_label: __address__
      replacement: kubernetes.default.svc:443
    - source_labels: [__meta_kubernetes_node_name]
      regex: (.+)
      target_label: __metrics_path__
      replacement: /api/v1/nodes/${1}/proxy/metrics

  # ── Node Exporter ──────────────────────────────────────────────────────────
  - job_name: node-exporter
    kubernetes_sd_configs:
    - role: pod
    relabel_configs:
    - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
      action: keep
      regex: node-exporter
    - source_labels: [__meta_kubernetes_pod_node_name]
      target_label: node
    - source_labels: [__meta_kubernetes_namespace]
      target_label: namespace

  # ── kube-state-metrics ─────────────────────────────────────────────────────
  - job_name: kube-state-metrics
    static_configs:
    - targets: ['kube-state-metrics.deepblue-monitoring:8080']
    metric_relabel_configs:
    - action: drop
      source_labels: [__name__]
      regex: kube_pod_container_status_waiting_reason

  # ── DeepBlue Ingestion Service ─────────────────────────────────────────────
  - job_name: deepblue-ingestion
    kubernetes_sd_configs:
    - role: pod
      namespaces:
        names: [deepblue-ingestion]
    relabel_configs:
    - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
      action: keep
      regex: "true"
    - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
      action: replace
      target_label: __metrics_path__
      regex: (.+)
    - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
      action: replace
      regex: ([^:]+)(?::\d+)?;(\d+)
      replacement: $1:$2
      target_label: __address__
    - action: labelmap
      regex: __meta_kubernetes_pod_label_(.+)
    - source_labels: [__meta_kubernetes_namespace]
      target_label: namespace
    - source_labels: [__meta_kubernetes_pod_name]
      target_label: pod
    - source_labels: [__meta_kubernetes_pod_node_name]
      target_label: node

  # ── DeepBlue API Service ────────────────────────────────────────────────────
  - job_name: deepblue-api
    kubernetes_sd_configs:
    - role: pod
      namespaces:
        names: [deepblue-api]
    relabel_configs:
    - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
      action: keep
      regex: "true"
    - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
      action: replace
      target_label: __metrics_path__
    - action: labelmap
      regex: __meta_kubernetes_pod_label_(.+)
    - source_labels: [__meta_kubernetes_namespace]
      target_label: namespace
    - source_labels: [__meta_kubernetes_pod_name]
      target_label: pod

  # ── DeepBlue Processing Service ────────────────────────────────────────────
  - job_name: deepblue-processing
    kubernetes_sd_configs:
    - role: pod
      namespaces:
        names: [deepblue-processing]
    relabel_configs:
    - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
      action: keep
      regex: "true"
    - action: labelmap
      regex: __meta_kubernetes_pod_label_(.+)
    - source_labels: [__meta_kubernetes_namespace]
      target_label: namespace
    - source_labels: [__meta_kubernetes_pod_name]
      target_label: pod

  # ── Kafka / MSK (via kafka-exporter) ──────────────────────────────────────
  - job_name: kafka-exporter
    static_configs:
    - targets: ['kafka-exporter.deepblue-monitoring:9308']
      labels:
        cluster: deepblue-msk
    metric_relabel_configs:
    - source_labels: [topic]
      target_label: kafka_topic

  # ── PostgreSQL / TimescaleDB (via postgres_exporter) ───────────────────────
  - job_name: postgres-exporter
    static_configs:
    - targets: ['postgres-exporter.deepblue-monitoring:9187']
      labels:
        db: timescaledb
        instance: deepblue-prod-tsdb

  # ── Redis (via redis_exporter) ──────────────────────────────────────────────
  - job_name: redis-exporter
    static_configs:
    - targets: ['redis-exporter.deepblue-monitoring:9121']
      labels:
        instance: deepblue-elasticache

  # ── Istio Service Mesh ─────────────────────────────────────────────────────
  - job_name: istio-mesh
    kubernetes_sd_configs:
    - role: pod
    relabel_configs:
    - source_labels: [__meta_kubernetes_pod_container_port_name]
      action: keep
      regex: .*-envoy-prom
    - action: labelmap
      regex: __meta_kubernetes_pod_label_(.+)

  # ── ArgoCD ─────────────────────────────────────────────────────────────────
  - job_name: argocd
    static_configs:
    - targets: ['argocd-metrics.deepblue-cicd:8082']
    - targets: ['argocd-server-metrics.deepblue-cicd:8083']
    - targets: ['argocd-repo-server.deepblue-cicd:8084']
